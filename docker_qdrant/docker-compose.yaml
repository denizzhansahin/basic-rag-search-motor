version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: my_qdrant_db_arama_motoru
    ports:
      - "6333:6333" # REST API portu
      - "6334:6334" # gRPC portu (daha hızlı iletişim için LangChain kullanabilir)
    volumes:
      - ./qdrant_data:/qdrant/storage # Verilerin bilgisayarında kalıcı olarak saklanacağı klasör
    restart: "no" # <-- ÖNEMLİ: "no" değeri sayesinde kendi kendine otomatik başlamaz! Sadece sen istersen çalışır.