events { worker_connections 1024; }

http {
    # 1. NestJS Gateway Grubu
    upstream nestjs_servers {
        ip_hash; 
        server nestjs_gateway:3000;
    }

    # 2. Ollama Grubu (Eğer Docker içinde birden fazla Ollama açacaksan)
    upstream ollama_servers {
        server host.docker.internal:11434; # Mac üzerindeki ana Ollama
        # server ollama_worker_2:11434;   # Gelecekte ekleyeceğin diğerleri
    }

    server {
        listen 80;

        # NestJS ve WebSocket trafiği
        location / {
            proxy_pass http://nestjs_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Bunu ekleyelim
        }

        # Ollama API trafiği (Python Worker'lar buraya istek atabilir)
        location /ollama/ {
            rewrite ^/ollama/(.*) /$1 break; # /ollama/ kısmını silip iletir
            proxy_pass http://ollama_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}